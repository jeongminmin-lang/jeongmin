<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Tone Guard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' },
                        surface: { bg: '#F8FAFC', card: '#FFFFFF', border: '#E2E8F0' },
                        brand: { base: '#208b6d', copy: '#d95c41' }
                    },
                    fontFamily: { sans: ['Pretendard', '-apple-system', 'sans-serif'] },
                    boxShadow: { 'soft': '0px 4px 20px rgba(0, 0, 0, 0.03)' }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2pdf & Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #F8FAFC; color: #334155; word-break: keep-all; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .widget-card { background-color: #FFFFFF; border-radius: 16px; border: 1px solid #E2E8F0; box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.02); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .keep-all { word-break: keep-all; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.3s ease-in-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #toast { visibility: hidden; opacity: 0; transition: visibility 0s, opacity 0.3s linear; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex text-slate-800">

    <aside class="w-[360px] bg-white border-r border-slate-200 flex flex-col h-screen sticky top-0 z-20 shadow-soft hidden lg:flex flex-shrink-0">
        
        <div class="h-20 flex items-center px-6 border-b border-slate-100">
            <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-white mr-3 shadow-sm">
                <i data-lucide="check-square" class="w-5 h-5"></i>
            </div>
            <h1 class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 tracking-wider mb-0.5">AI COPYWRITING</span>
                <span class="text-xl font-black tracking-tight text-slate-900 leading-none">Brand Tone Guard</span>
            </h1>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
            <div class="flex justify-end">
                <button onclick="loadSampleData()" class="text-[11px] text-slate-500 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-md transition font-bold flex items-center gap-1.5 border border-slate-200">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> 한투 샘플 로드
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[13px] font-bold text-slate-700 mb-1.5">클라이언트 (브랜드명)</label>
                    <input type="text" id="brandInput" placeholder="예: 한국투자신탁운용, 토스" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-slate-400 transition-all font-medium">
                </div>
                
                <div>
                    <label class="block text-[13px] font-bold text-slate-700 mb-1.5">메인 타겟 (선택)</label>
                    <input type="text" id="targetInput" placeholder="예: 2030 영리한 투자자" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-slate-400 transition-all font-medium">
                </div>

                <div>
                    <div class="flex justify-between items-end mb-1.5">
                        <label class="block text-[13px] font-bold text-slate-700">기획 카피</label>
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded" id="charCount">0 자</span>
                    </div>
                    <textarea id="copyInput" rows="5" placeholder="기획 중인 카피를 입력하세요..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-slate-400 transition-all resize-none font-medium leading-relaxed"></textarea>
                </div>
            </div>

            <div class="pt-2">
                <button onclick="analyzeCopy()" id="analyzeBtn" class="w-full py-3.5 bg-slate-800 hover:bg-slate-900 text-white text-[15px] font-bold rounded-lg transition-all flex items-center justify-center gap-2 shadow-md">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> AI 실시간 분석 & 검수 시작
                </button>
            </div>

            <div class="mt-auto pt-6 border-t border-slate-100 flex-1 flex flex-col min-h-[150px]">
                <h3 class="text-xs font-bold text-slate-500 flex items-center gap-1.5 mb-3">
                    <i data-lucide="history" class="w-3.5 h-3.5"></i> 최근 분석 내역
                </h3>
                <div id="historyList" class="space-y-2 overflow-y-auto flex-1 pr-1">
                    <p class="text-[11px] text-slate-400 text-center py-4">저장된 내역이 없습니다.</p>
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-100 space-y-4">
                <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                    <label class="block text-[11px] font-bold text-indigo-700 mb-1.5">Gemini API Key (필수)</label>
                    <div class="flex gap-2">
                        <input type="password" id="geminiApiKey" placeholder="AIzaSy..." class="w-full bg-white border border-indigo-200 rounded px-2.5 py-2 text-xs focus:outline-none focus:border-indigo-400 font-mono">
                        <button onclick="saveApiKey()" class="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold rounded shadow-sm transition flex-shrink-0">저장</button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">YouTube API Key (선택/리얼 데이터용)</label>
                    <div class="flex gap-2">
                        <input type="password" id="ytApiKey" placeholder="입력 시 실제 썸네일 노출" class="w-full bg-white border border-slate-200 rounded px-2.5 py-2 text-xs focus:outline-none focus:border-slate-400 font-mono">
                        <button onclick="saveYtApiKey()" class="px-3 py-2 bg-slate-600 hover:bg-slate-700 text-white text-[11px] font-bold rounded shadow-sm transition flex-shrink-0">저장</button>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto bg-surface-bg relative scroll-smooth" id="mainScroll">
        
        <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 bg-white/80 backdrop-blur-md sticky top-0 z-10 flex-shrink-0">
            <h2 class="text-lg font-extrabold text-slate-800 tracking-tight">카피라이팅 심층 검수 리포트</h2>
            <div class="flex items-center gap-2">
                <button onclick="copyFullReport()" class="text-xs bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-4 py-2 rounded-md font-bold transition flex items-center gap-1.5 shadow-sm">
                    <i data-lucide="copy" class="w-4 h-4"></i> 텍스트 복사
                </button>
                <button onclick="downloadPDF()" class="text-xs bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-md font-bold transition flex items-center gap-1.5 shadow-sm">
                    <i data-lucide="file-down" class="w-4 h-4"></i> 리포트 PDF 저장
                </button>
            </div>
        </header>

        <div class="p-8 max-w-[1100px] w-full mx-auto relative flex-1 pb-20">
            
            <div id="emptyState" class="h-full min-h-[600px] flex flex-col items-center justify-center text-slate-400">
                <div class="w-20 h-20 bg-white rounded-full shadow-sm border border-slate-100 flex items-center justify-center mb-5">
                    <i data-lucide="file-search" class="w-8 h-8 text-slate-300"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-600 mb-2 tracking-tight">분석 대기 중</h3>
                <p class="text-sm font-medium">좌측 패널에 브랜드, 타겟, 카피를 입력하고 분석을 시작하세요.</p>
            </div>

            <div id="loadingState" class="hidden h-full min-h-[600px] flex flex-col items-center justify-center">
                <div class="w-24 h-24 mb-6 animate-float relative">
                    <div class="absolute inset-0 border-4 border-slate-200 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-slate-800 rounded-full border-t-transparent animate-spin"></div>
                    <i data-lucide="bot" class="w-10 h-10 text-slate-800 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                </div>
                <div class="text-3xl font-black text-slate-800 mb-3 tracking-tight" id="loadingPercent">20 %</div>
                <h3 class="text-lg font-extrabold text-slate-600 mb-2 tracking-tight" id="loadingMainText">브랜드 톤앤매너 및 심의 기준 스크래핑 중...</h3>
                <p class="text-sm text-slate-400 font-medium">완료 후 자동으로 페이지가 전환됩니다.</p>
            </div>

            <div id="resultDashboard" class="hidden flex flex-col gap-6 animate-in fade-in duration-700">
                
                <div id="legalAlertBanner" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl shadow-sm">
                    <div class="flex items-start gap-3">
                        <i data-lucide="shield-alert" class="w-6 h-6 text-red-600 mt-0.5 animate-pulse shrink-0"></i>
                        <div class="w-full">
                            <h3 class="text-[15px] font-extrabold text-red-800 mb-1">치명적인 법적/심의 리스크 발견!</h3>
                            <div id="legalAlertText" class="text-[13px] text-red-700 font-medium keep-all leading-relaxed space-y-1"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="widget-card p-6 flex flex-col justify-between col-span-1 border-t-8" id="statusCardBox">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">최종 판정 결과</p>
                                <span id="resTargetName" class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-2.5 py-1 rounded-md text-[10px] font-bold">타겟: -</span>
                            </div>
                            <h3 id="statusTitle" class="text-4xl font-black tracking-tight mb-2">-</h3>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-100 relative group">
                            <div class="flex items-end justify-between mb-2">
                                <span class="text-xs font-bold text-slate-500">종합 적합도 점수</span>
                                <p class="text-3xl font-black text-slate-800 leading-none"><span id="resScore">0</span><span class="text-sm text-slate-400 font-medium">/100</span></p>
                            </div>
                            <!-- 수정 1: 'open' 추가 -->
                            <details open class="text-[11px] font-medium text-slate-500 mt-3 bg-slate-50 rounded-lg border border-slate-100">
                                <summary class="px-3 py-2 cursor-pointer hover:bg-slate-100 flex items-center justify-between font-bold text-slate-600">
                                    <span>🔍 왜 이 점수인가요? (감점 채점표)</span>
                                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                                </summary>
                                <div class="px-3 pb-3 pt-1 space-y-1.5" id="scoreBreakdownList"></div>
                            </details>
                        </div>
                    </div>

                    <div class="widget-card p-6 col-span-1 lg:col-span-2 bg-slate-800 text-white flex flex-col justify-center relative overflow-hidden">
                        <i data-lucide="quote" class="absolute right-4 bottom-4 w-24 h-24 text-white/5"></i>
                        <h3 class="text-sm font-extrabold text-primary-400 flex items-center gap-2 mb-4 relative z-10">
                            <i data-lucide="zap" class="w-4 h-4"></i> 마케터를 위한 AI 핵심 3줄 요약
                        </h3>
                        <ul id="coreSummaryList" class="space-y-3 text-[14px] font-medium text-slate-200 leading-relaxed keep-all list-none relative z-10"></ul>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="widget-card group border border-slate-200 flex flex-col">
                        <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="text-[14px] font-extrabold text-slate-800 flex items-center gap-2">
                                <i data-lucide="radar" class="w-4 h-4 text-slate-500"></i> 톤앤매너 보이스 갭 분석
                            </h3>
                            <span id="gapBadge" class="text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-1 rounded-full">갭 발견</span>
                        </div>
                        <div class="p-6 flex-1 flex flex-col xl:flex-row items-center gap-6">
                            <div class="w-full xl:w-1/2 h-48 relative shrink-0">
                                <canvas id="radarChart"></canvas>
                            </div>
                            <div class="w-full xl:w-1/2 flex flex-col h-full justify-center">
                                <div class="flex gap-4 mb-4">
                                    <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-600">
                                        <span class="w-3 h-3 rounded-sm bg-[#208b6d]"></span> 브랜드 기준
                                    </div>
                                    <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-600">
                                        <span class="w-3 h-3 rounded-sm bg-[#d95c41]"></span> 이번 카피
                                    </div>
                                </div>
                                <div class="pt-4 border-t border-slate-100 w-full">
                                    <p class="text-[11px] text-slate-400 font-bold mb-2">가장 큰 갭 분석</p>
                                    <div id="gapText" class="text-[13px] font-medium text-slate-800 space-y-1.5 mb-3 leading-relaxed keep-all"></div>
                                    <div class="bg-slate-50 p-3.5 rounded-lg border border-slate-200 shadow-sm mt-3">
                                        <p class="text-[11px] text-slate-500 font-bold mb-2 flex items-center gap-1.5"><i data-lucide="lightbulb" class="w-3.5 h-3.5 text-amber-500"></i> AI 분석 인사이트</p>
                                        <div id="gapInsightList" class="space-y-1.5 text-[13px] text-slate-700 leading-relaxed font-medium keep-all"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="widget-card border border-slate-200 flex flex-col">
                        <div class="p-5 border-b border-slate-100">
                            <h3 class="text-[14px] font-extrabold text-slate-800 flex items-center gap-2">
                                <i data-lucide="ban" class="w-4 h-4 text-slate-500"></i> 금칙어 및 문장 호흡(리듬) 체크
                            </h3>
                        </div>
                        <div class="p-6 flex-1 flex flex-col gap-3 justify-center" id="rhythmCheckContainer"></div>
                    </div>
                </div>

                <div class="widget-card p-6 border-l-4 border-l-primary-500 bg-primary-50/30">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-[15px] font-extrabold text-slate-800 flex items-center gap-2">
                            <i data-lucide="scissors" class="w-5 h-5 text-primary-500"></i> 원본 최소 수정 가이드 (Before & After)
                        </h3>
                        <div class="flex items-center gap-2 text-sm font-bold">
                            <span class="text-slate-500" id="scoreBefore">0점</span>
                            <i data-lucide="arrow-right" class="w-4 h-4 text-slate-400"></i>
                            <span class="text-emerald-600" id="scoreAfter">0점</span>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row gap-4 items-stretch">
                        <div class="flex-1 bg-white p-4 rounded-xl border border-rose-100 shadow-sm relative">
                            <span class="absolute -top-2.5 left-4 bg-rose-100 text-rose-600 text-[10px] font-bold px-2 py-0.5 rounded">원본 (수정 요망)</span>
                            <p id="minEditOriginal" class="text-[14px] text-slate-600 leading-relaxed font-medium mt-1">-</p>
                        </div>
                        <div class="flex items-center justify-center shrink-0">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 text-slate-400">
                                <i data-lucide="arrow-right" class="w-4 h-4 hidden md:block"></i>
                                <i data-lucide="arrow-down" class="w-4 h-4 md:hidden"></i>
                            </div>
                        </div>
                        <div class="flex-1 bg-white p-4 rounded-xl border border-emerald-100 shadow-sm relative">
                            <span class="absolute -top-2.5 left-4 bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1"><i data-lucide="check" class="w-3 h-3"></i>최소 수정본</span>
                            <p id="minEditRevised" class="text-[14px] text-slate-800 leading-relaxed font-medium mt-1">-</p>
                        </div>
                    </div>
                </div>

                <!-- 수정 2: 'open' 추가 -->
                <details open class="widget-card group border border-slate-200">
                    <summary class="p-5 text-[14px] font-extrabold text-slate-800 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition rounded-xl group-open:rounded-b-none border-b border-transparent group-open:border-slate-100">
                        <span class="flex items-center gap-2"><i data-lucide="search" class="w-4 h-4 text-blue-500"></i> 브랜드 리서치 브리핑</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-medium text-blue-500 bg-blue-50 px-2 py-0.5 rounded">클릭하여 펼치기</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300 group-open:rotate-180"></i>
                        </div>
                    </summary>
                    <div class="p-6 bg-slate-50/50">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                            <div class="p-4 border border-slate-100 rounded-lg bg-slate-50">
                                <p class="text-[11px] font-bold text-blue-600 mb-2 flex items-center gap-1"><i data-lucide="fingerprint" class="w-3.5 h-3.5"></i> 브랜드 정체성</p>
                                <div id="resIdentity" class="text-[13px] text-slate-700 leading-relaxed font-medium keep-all space-y-1"></div>
                            </div>
                            <div class="p-4 border border-slate-100 rounded-lg bg-slate-50">
                                <p class="text-[11px] font-bold text-purple-600 mb-2 flex items-center gap-1"><i data-lucide="trending-up" class="w-3.5 h-3.5"></i> 최신 시장 트렌드</p>
                                <div id="resTrend" class="text-[13px] text-slate-700 leading-relaxed font-medium keep-all space-y-1"></div>
                            </div>
                            <div class="p-4 border border-slate-100 rounded-lg bg-slate-50">
                                <p class="text-[11px] font-bold text-rose-600 mb-2 flex items-center gap-1"><i data-lucide="shield" class="w-3.5 h-3.5"></i> 컴플라이언스 가이드</p>
                                <div id="resCompliance" class="text-[13px] text-slate-700 leading-relaxed font-medium keep-all space-y-1"></div>
                            </div>
                            <div class="p-4 border border-slate-100 rounded-lg bg-slate-50">
                                <p class="text-[11px] font-bold text-amber-600 mb-2 flex items-center gap-1"><i data-lucide="swords" class="w-3.5 h-3.5"></i> 경쟁사 TOP 3</p>
                                <ul id="resCompetitors" class="text-[13px] text-slate-700 leading-relaxed font-medium keep-all space-y-1.5 list-none"></ul>
                            </div>
                        </div>
                    </div>
                </details>

                <!-- 수정 3: 'open' 추가 -->
                <details open class="widget-card group border border-slate-200">
                    <summary class="p-5 text-[14px] font-extrabold text-slate-800 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition rounded-xl group-open:rounded-b-none border-b border-transparent group-open:border-slate-100">
                        <span class="flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4 text-indigo-500"></i> 매체별 변환 팩 (제안서 복사용)</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-medium text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded">클릭하여 펼치기</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300 group-open:rotate-180"></i>
                        </div>
                    </summary>
                    <div class="p-6 bg-slate-50/50 grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">제안서 헤드카피</p>
                            <p id="mediaHead" class="text-[14px] font-bold text-slate-800 leading-relaxed keep-all">-</p>
                        </div>
                        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">디스플레이 배너 (20자 이내)</p>
                            <p id="mediaBanner" class="text-[14px] font-bold text-slate-800 leading-relaxed keep-all">-</p>
                        </div>
                        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">유튜브/숏폼 오프닝 자막</p>
                            <p id="mediaShorts" class="text-[14px] font-bold text-slate-800 leading-relaxed keep-all">-</p>
                        </div>
                    </div>
                </details>

                <!-- 수정 4: 'open' 추가 -->
                <details open class="widget-card group border border-slate-200">
                    <summary class="p-5 text-[14px] font-extrabold text-slate-800 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition rounded-xl group-open:rounded-b-none border-b border-transparent group-open:border-slate-100">
                        <span class="flex items-center gap-2"><i data-lucide="video" class="w-4 h-4 text-red-500"></i> 시각 자료 확보 (영상 레퍼런스)</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-medium text-red-500 bg-red-50 px-2 py-0.5 rounded">클릭하여 펼치기</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300 group-open:rotate-180"></i>
                        </div>
                    </summary>
                    <div class="p-6 bg-slate-50/50 grid grid-cols-1 xl:grid-cols-2 gap-6">
                        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                                <h3 class="text-[13px] font-extrabold text-slate-800 flex items-center gap-1.5 tracking-tight"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="w-5 h-auto" alt="YouTube"> 브랜드 유튜브 인기 영상 TOP 3</h3>
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-medium">최근 2년 기준</span>
                            </div>
                            <div id="youtubeContainer" class="space-y-4"></div>
                        </div>
                        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                                <h3 class="text-[13px] font-extrabold text-slate-800 flex items-center gap-1.5 tracking-tight"><i data-lucide="tv" class="w-4 h-4 text-blue-500"></i> 최신 TVCF 레퍼런스</h3>
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-medium">최근 2년 기준</span>
                            </div>
                            <div id="tvcfContainer" class="space-y-4"></div>
                        </div>
                    </div>
                </details>

            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-50">
        <i data-lucide="info" class="w-5 h-5 text-white"></i>
        <span id="toastMessage" class="text-sm font-medium">알림</span>
    </div>

    <script>
        lucide.createIcons();

        const brandInput = document.getElementById('brandInput');
        const targetInput = document.getElementById('targetInput');
        const copyInput = document.getElementById('copyInput');
        const geminiApiKeyInput = document.getElementById('geminiApiKey');
        const ytApiKeyInput = document.getElementById('ytApiKey');
        
        let appHistory = [];
        let radarChartInstance = null;

        copyInput.addEventListener('input', () => document.getElementById('charCount').textContent = `${copyInput.value.length} 자`);

        window.onload = () => {
            try {
                appHistory = JSON.parse(localStorage.getItem('appHistory')) || [];
                if(localStorage.getItem('geminiApiKey')) geminiApiKeyInput.value = localStorage.getItem('geminiApiKey');
                if(localStorage.getItem('ytApiKey')) ytApiKeyInput.value = localStorage.getItem('ytApiKey');
            } catch (e) {
                console.warn("Local storage is disabled or unavailable.");
            }
            renderHistoryList();
        };

        function saveApiKey() {
            const key = geminiApiKeyInput.value.trim();
            if (key) {
                try { localStorage.setItem('geminiApiKey', key); } catch(e) {}
                showToast("Gemini API Key가 안전하게 저장되었습니다.");
            } else {
                showToast("API Key를 입력해주세요.");
            }
        }

        function saveYtApiKey() {
            const key = ytApiKeyInput.value.trim();
            if (key) {
                try { localStorage.setItem('ytApiKey', key); } catch(e) {}
                showToast("YouTube API Key가 안전하게 저장되었습니다.");
            } else {
                showToast("API Key를 입력해주세요.");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadSampleData() {
            brandInput.value = "토스(Toss)";
            targetInput.value = "20대 대학생 및 사회초년생";
            copyInput.value = "이 세상에 없던 압도적이고 혁신적인 금융의 새로운 패러다임! 쥐꼬리만한 월급, 토스 앱 하나로 쉽고 간편하게 3배로 뻥튀기 해보세요. 수익 보장!";
            document.getElementById('charCount').textContent = `${copyInput.value.length} 자`;
            showToast("테스트용 토스 샘플이 로드되었습니다.");
        }

        function renderHistoryList() {
            const list = document.getElementById('historyList');
            if(appHistory.length === 0) {
                list.innerHTML = '<p class="text-[11px] text-slate-400 text-center py-4">저장된 내역이 없습니다.</p>';
                return;
            }
            list.innerHTML = appHistory.map((item, idx) => `
                <button onclick="loadHistoryItem(${idx})" class="w-full text-left p-3 rounded-lg border border-slate-100 hover:bg-slate-50 hover:border-slate-300 transition bg-white shadow-sm flex flex-col gap-1 group">
                    <div class="flex justify-between items-center w-full mb-1">
                        <span class="text-[12px] font-bold text-slate-700 truncate">${item.brand}</span>
                        <span class="text-[9px] text-slate-400">${item.date}</span>
                    </div>
                    <span class="text-[11px] text-slate-500 line-clamp-1 group-hover:text-slate-800">${item.copy}</span>
                </button>
            `).join('');
        }

        function loadHistoryItem(index) {
            const data = appHistory[index];
            brandInput.value = data.brand;
            targetInput.value = data.target;
            copyInput.value = data.copy;
            document.getElementById('charCount').textContent = `${data.copy.length} 자`;
            renderResults(data.result, data.ytVideos, data.target);
            showToast("과거 분석 내역을 불러왔습니다.");
        }

        function downloadPDF() {
            const element = document.getElementById('resultDashboard');
            if (element.classList.contains('hidden')) return showToast("다운로드할 리포트가 없습니다.");
            
            const details = element.querySelectorAll('details');
            details.forEach(d => d.setAttribute('open', ''));

            showToast("PDF 생성을 시작합니다. 잠시만 기다려주세요.");
            const opt = {
                margin: [10, 10, 10, 10],
                filename: `${brandInput.value || '검수'}_리포트.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#F8FAFC' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        async function fetchYouTubeData(brand) {
            const ytKey = ytApiKeyInput.value.trim();
            if (!ytKey) return null; 
            const date = new Date(); date.setFullYear(date.getFullYear() - 2);
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(`${brand} 광고`)}&type=video&order=viewCount&publishedAfter=${date.toISOString()}&maxResults=3&key=${ytKey}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                return data.items.map(item => ({
                    id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle,
                    thumbnail: `https://img.youtube.com/vi/${item.id.videoId}/mqdefault.jpg`, date: new Date(item.snippet.publishedAt).toLocaleDateString('ko-KR')
                }));
            } catch (err) { return null; }
        }

        function simulateLoading() {
            const percentEl = document.getElementById('loadingPercent');
            const mainTextEl = document.getElementById('loadingMainText');
            let p = 20;
            const texts = ["브랜드 아이덴티티 및 타겟 성향 분석 중...", "금칙어, 문장 호흡 및 리스크 스캐닝 중...", "표절 검사 및 최소 수정 가이드 도출 중..."];
            const iv = setInterval(() => {
                p += Math.floor(Math.random() * 8) + 3;
                if (p > 98) p = 98;
                percentEl.textContent = `${p} %`;
                if (p > 40 && p < 70) mainTextEl.textContent = texts[1];
                else if (p >= 70) mainTextEl.textContent = texts[2];
            }, 600);
            return iv;
        }

        function renderRadarChart(toneData) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(radarChartInstance) radarChartInstance.destroy();

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: toneData.labels,
                    datasets: [
                        { label: '브랜드 기준 보이스', data: toneData.brand, backgroundColor: 'rgba(32, 139, 109, 0.2)', borderColor: '#208b6d', pointBackgroundColor: '#208b6d', borderWidth: 2, fill: true },
                        { label: '이번 카피의 보이스', data: toneData.copy, backgroundColor: 'rgba(217, 92, 65, 0.1)', borderColor: '#d95c41', pointBackgroundColor: '#d95c41', borderWidth: 2, borderDash: [5, 5], fill: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { angleLines: { color: 'rgba(0,0,0,0.05)' }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { font: { family: 'Pretendard', size: 11, weight: 'bold' }, color: '#64748b' }, ticks: { display: false, min: 0, max: 100, stepSize: 20 } } } }
            });
        }

        async function analyzeCopy() {
            const geminiKey = geminiApiKeyInput.value.trim();
            if (!geminiKey) return showToast("좌측 하단의 [Gemini API Key]를 먼저 발급받아 입력해주세요.");

            const brand = brandInput.value.trim();
            const copy = copyInput.value.trim();
            const target = targetInput.value.trim() || '일반 대중';

            if (!brand || !copy) return showToast("브랜드명과 카피를 입력해주세요.");

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultDashboard').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            const loadingInterval = simulateLoading();
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('mainScroll').scrollTop = 0;

            try {
                let ytVideos = await fetchYouTubeData(brand);

                const sysPrompt = "당신은 15년 차 시니어 카피라이터 및 심의 가이드라인 전문가입니다. 2024~2026년 기준 실제 마케팅 데이터를 바탕으로 아주 예리하게 카피를 분석합니다. 마크다운을 빼고 순수 JSON만 반환하세요. \n\n**필수 지침:**\n1. 문장 호흡(리듬) 분석을 매우 엄격하게 합니다. 예: 토스는 접속사 없는 짧고 직관적인 단문 사용. 현대차는 진중한 장문. 입력된 카피가 브랜드 평소 호흡과 다르면 반드시 '경고'를 주고 피드백하세요.\n2. 파격 숏폼형 대체 카피는 평범하면 안 됩니다. 1초 만에 시선을 끄는 '도발적 질문, 후킹, 강력한 공감대'로 작성하되 심의를 지키세요.\n3. 분석 텍스트(요약, 인사이트, 브리핑 등)에는 <strong> 태그를 적극 활용하여 핵심 단어를 볼드 처리하고, 문장은 '• ' 로 시작하여 리스트업되게 작성하세요.";
                const userPrompt = `
                    브랜드명: ${brand}
                    타겟: ${target}
                    기획 카피: "${copy}"
                    
                    {
                        "coreSummary": ["• <strong>핵심 문제점/잘된 점</strong> 1줄", "• <strong>문장 호흡 및 톤</strong> 분석 요약", "• <strong>개선 방향</strong> 요약"],
                        "analysis": {
                            "status": "통과", "경고", "위험" 중 1,
                            "score": 0~100,
                            "scoreBreakdown": [ { "reason": "법적 규제 위반", "deduction": "-20" } ],
                            "legalRisks": [ {"type": "금소법 위반", "text": "<strong>위반 단어</strong> 포함 위험"} ] // 없으면 빈 배열
                        },
                        "toneRadar": {
                            "labels": ["전문성", "신뢰감", "유머", "친근함", "단정함"],
                            "brand": [80, 90, 10, 40, 70],
                            "copy": [40, 30, 80, 90, 20],
                            "gapCount": 2,
                            "gapDetails": [ {"label": "유머", "val": "+70%"}, {"label": "단정함", "val": "-50%"} ],
                            "gapInsights": [ "• 브랜드 핵심인 <strong>단정함</strong>이 훼손되었습니다.", "• 지나친 <strong>유머</strong>로 신뢰감이 떨어집니다." ]
                        },
                        "checks": {
                            "forbidden": [ {"word": "영끌", "reason": "품위 훼손 은어", "type": "사용 지양"} ], // 없으면 빈 배열
                            "rhythm": { "status": "경고" 또는 "통과", "text": "• <strong>${brand}</strong> 특유의 <strong>간결한 단문 호흡</strong>과 맞지 않는 만연체입니다." }
                        },
                        "minimalEdit": { "originalStr": "문제된 <span class='text-red-500 line-through'>수익 보장</span> 문장", "revisedStr": "수정된 <span class='text-emerald-600 font-bold'>안정적 수익률</span> 문장", "scoreBefore": 45, "scoreAfter": 85 },
                        "brandHistoryCheck": { "isDuplicate": boolean, "similarity": 0~100, "message": "• <strong>과거 캠페인</strong>과 85% 유사. 브랜드 일관성 측면에선 좋으나 <strong>신선함</strong>은 부족합니다." },
                        "competitorHistoryCheck": { "isDuplicate": boolean, "competitorName": "경쟁사명", "similarity": 0~100, "message": "• <strong>경쟁사(OO)</strong>가 24년에 사용한 카피와 매우 유사하여 <strong>표절 논란</strong> 위험이 있습니다." },
                        "alternatives": { 
                            "a": ["• <strong>[신뢰감 집중]</strong> 안정성을 강조하는 워딩 제안 1", "• <strong>[타겟 공감]</strong> 타겟의 페인포인트를 짚는 제안 2"], 
                            "b": ["• <strong>[1초 후킹]</strong> 도발적이고 자극적인 질문으로 시작하는 숏폼 자막", "• <strong>[호기심 극대화]</strong> 뒷 내용이 궁금해지는 파격적 앵글"] 
                        },
                        "briefing": {
                            "identity": ["• <strong>정체성 1</strong> 내용", "• <strong>정체성 2</strong> 내용"], 
                            "trend": ["• <strong>트렌드 1</strong> 내용"], 
                            "compliance": ["• <strong>수익률 보장</strong> 절대 금지", "• <strong>과장 표현</strong> 금지"],
                            "competitors": [ { "name": "A사", "reason": "이유" }, { "name": "B사", "reason": "이유" }, { "name": "C사", "reason": "이유" } ]
                        },
                        "mediaMix": { "headCopy": "제안서 헤드", "banner": "배너 카피", "shortForm": "숏폼 오프닝" },
                        "tvcf": [ 
                            {"title": "실제 유명 TVCF명 1", "date": "2024.05", "description": "요약"},
                            {"title": "실제 유명 TVCF명 2", "date": "2023.11", "description": "요약"}
                        ],
                        "youtube": [ 
                            {"title": "실제 인기 영상명 1", "channel": "채널명", "date": "2024.11", "views": "250만회"},
                            {"title": "실제 인기 영상명 2", "channel": "채널명", "date": "2023.09", "views": "85만회"}
                        ]
                    }
                `;

                // [중요] 최신 안정화 모델인 gemini-2.5-flash 로 고정 및 JSON 설정 적용
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: userPrompt }] }], 
                        systemInstruction: { parts: [{ text: sysPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await res.json();
                
                if(!data.candidates) {
                    const errMsg = data.error?.message || "API 키가 올바르지 않거나 한도 초과입니다.";
                    throw new Error(`[API 거절 사유] ${errMsg}`);
                }
                
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json\s*/gi, '').replace(/```\s*$/gi, '').trim();
                const resultJSON = JSON.parse(rawText);

                clearInterval(loadingInterval);
                document.getElementById('loadingPercent').textContent = "100 %";
                
                appHistory.unshift({ brand, target, copy, result: resultJSON, ytVideos, date: new Date().toLocaleString() });
                if(appHistory.length > 5) appHistory.pop();
                try { localStorage.setItem('appHistory', JSON.stringify(appHistory)); } catch(e) {}
                renderHistoryList();

                renderResults(resultJSON, ytVideos, target);

            } catch (err) {
                console.error(err);
                clearInterval(loadingInterval);
                showToast("오류 발생: " + (err.message || "분석에 실패했습니다. 키를 확인해주세요."));
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('loadingState').classList.add('hidden');
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function renderResults(data, ytVideos, targetName) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultDashboard').classList.remove('hidden');

            const legalBanner = document.getElementById('legalAlertBanner');
            const legalText = document.getElementById('legalAlertText');
            if (data.analysis.legalRisks && data.analysis.legalRisks.length > 0) {
                legalBanner.classList.remove('hidden');
                legalText.innerHTML = data.analysis.legalRisks.map(r => `<p><strong class="mr-1">[${r.type}]</strong> ${r.text}</p>`).join('');
            } else { legalBanner.classList.add('hidden'); }

            document.getElementById('coreSummaryList').innerHTML = data.coreSummary.map(s => `<li>${s}</li>`).join('');
            const titleEl = document.getElementById('statusTitle');
            const cardBox = document.getElementById('statusCardBox');
            cardBox.className = "widget-card p-6 flex flex-col justify-between col-span-1 border-t-8"; 
            
            if(data.analysis.status === '통과') {
                titleEl.innerHTML = '통과 <span class="text-2xl text-slate-400 font-bold ml-1">(안전)</span>'; titleEl.className = 'text-4xl font-black text-emerald-600 tracking-tight mb-2'; cardBox.classList.add('border-t-emerald-500');
            } else if(data.analysis.status === '경고') {
                titleEl.innerHTML = '경고 <span class="text-2xl text-slate-400 font-bold ml-1">(수정요망)</span>'; titleEl.className = 'text-4xl font-black text-amber-500 tracking-tight mb-2'; cardBox.classList.add('border-t-amber-500');
            } else {
                titleEl.innerHTML = '위험 <span class="text-2xl text-slate-400 font-bold ml-1">(반려)</span>'; titleEl.className = 'text-4xl font-black text-rose-600 tracking-tight mb-2'; cardBox.classList.add('border-t-rose-500');
            }
            
            document.getElementById('resScore').textContent = data.analysis.score;
            document.getElementById('resTargetName').textContent = `타겟: ${targetName}`;

            const scoreList = document.getElementById('scoreBreakdownList');
            if (data.analysis.scoreBreakdown && data.analysis.scoreBreakdown.length > 0) {
                scoreList.innerHTML = `<div class="flex justify-between border-b border-slate-200 pb-1 mb-1"><span class="text-slate-400">기본 점수</span><span class="font-bold">100점</span></div>` +
                    data.analysis.scoreBreakdown.map(d => `<div class="flex justify-between text-rose-500"><span>- ${d.reason}</span><span class="font-bold">${d.deduction}점</span></div>`).join('');
            } else { scoreList.innerHTML = `<div class="text-emerald-600 font-bold py-1">감점 요인이 없습니다!</div>`; }

            renderRadarChart(data.toneRadar);
            document.getElementById('gapBadge').textContent = `갭 발견 ${data.toneRadar.gapCount}건`;
            document.getElementById('gapText').innerHTML = data.toneRadar.gapDetails.map(g => `<span class="block text-slate-700">• <strong>${g.label}</strong>: <span class="${g.val.includes('+') ? 'text-rose-500 font-bold' : 'text-blue-500 font-bold'}">${g.val}</span> 격차 발생</span>`).join('');
            document.getElementById('gapInsightList').innerHTML = data.toneRadar.gapInsights.map(i => `<p class="mb-1">${i}</p>`).join('');

            const rhythmCont = document.getElementById('rhythmCheckContainer');
            let checksHtml = '';
            if(data.checks.forbidden && data.checks.forbidden.length > 0) {
                checksHtml += data.checks.forbidden.map(f => `<div class="bg-red-50 text-red-800 p-3 rounded-lg flex items-center gap-2 border border-red-100"><i data-lucide="alert-triangle" class="w-4 h-4 text-red-500 shrink-0"></i><span class="text-[13px] font-medium keep-all"><strong>"${f.word}"</strong> — ${f.reason} <span class="float-right text-[11px] font-bold text-red-400 ml-2">${f.type}</span></span></div>`).join('');
            } else { checksHtml += `<div class="bg-slate-50 text-slate-500 p-3 rounded-lg text-[13px] font-medium border border-slate-100">발견된 금칙어/지양 표현 없음</div>`; }

            const rStatus = data.checks.rhythm.status === '경고' ? 'bg-amber-50 text-amber-800 border-amber-100' : 'bg-emerald-50 text-emerald-800 border-emerald-100';
            const rIcon = data.checks.rhythm.status === '경고' ? 'alert-circle' : 'check';
            const rIconColor = data.checks.rhythm.status === '경고' ? 'text-amber-500' : 'text-emerald-500';
            checksHtml += `<div class="${rStatus} p-3 rounded-lg flex items-center gap-2 border"><i data-lucide="${rIcon}" class="w-4 h-4 ${rIconColor} shrink-0"></i><span class="text-[13px] font-medium keep-all">${data.checks.rhythm.text}</span></div>`;
            rhythmCont.innerHTML = checksHtml;

            document.getElementById('minEditOriginal').innerHTML = data.minimalEdit.originalStr;
            document.getElementById('minEditRevised').innerHTML = data.minimalEdit.revisedStr;
            document.getElementById('scoreBefore').textContent = `${data.minimalEdit.scoreBefore}점`;
            document.getElementById('scoreAfter').textContent = `${data.minimalEdit.scoreAfter}점`;

            const bBox = document.getElementById('brandHistBox');
            if(data.brandHistoryCheck.isDuplicate) {
                bBox.className = "p-4 rounded-xl border border-amber-200 bg-amber-50 flex flex-col justify-center shadow-sm flex-1";
                bBox.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="alert-circle" class="w-5 h-5 text-amber-500 shrink-0"></i><h4 class="text-sm font-bold text-amber-800">자사 캠페인 (유사도 ${data.brandHistoryCheck.similarity}%)</h4></div><p class="text-[12px] text-amber-700 leading-relaxed font-medium keep-all">${data.brandHistoryCheck.message}</p>`;
            } else {
                bBox.className = "p-4 rounded-xl border border-emerald-200 bg-emerald-50 flex flex-col justify-center shadow-sm flex-1";
                bBox.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="check-circle" class="w-5 h-5 text-emerald-500 shrink-0"></i><h4 class="text-sm font-bold text-emerald-800">자사 카피 안전함</h4></div><p class="text-[12px] text-emerald-700 font-medium keep-all">과거 캠페인과 겹치지 않아 신선합니다.</p>`;
            }

            const cBox = document.getElementById('compHistBox');
            if(data.competitorHistoryCheck.isDuplicate) {
                cBox.className = "p-4 rounded-xl border border-rose-200 bg-rose-50 flex flex-col justify-center shadow-sm flex-1 mt-4";
                cBox.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="siren" class="w-5 h-5 text-rose-500 shrink-0"></i><h4 class="text-sm font-bold text-rose-800">경쟁사 표절 경고 (유사도 ${data.competitorHistoryCheck.similarity}%)</h4></div><p class="text-[12px] text-rose-700 leading-relaxed font-medium keep-all">${data.competitorHistoryCheck.message}</p>`;
            } else {
                cBox.className = "p-4 rounded-xl border border-emerald-200 bg-emerald-50 flex flex-col justify-center shadow-sm flex-1 mt-4";
                cBox.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="shield-check" class="w-5 h-5 text-emerald-500 shrink-0"></i><h4 class="text-sm font-bold text-emerald-800">경쟁사 카피 방어 완료</h4></div><p class="text-[12px] text-emerald-700 font-medium keep-all">최근 3년 경쟁사가 사용한 적 없는 카피입니다.</p>`;
            }

            document.getElementById('altA').innerHTML = data.alternatives.a.map(a => `<p>${a}</p>`).join('');
            document.getElementById('altB').innerHTML = data.alternatives.b.map(b => `<p>${b}</p>`).join('');

            document.getElementById('resIdentity').innerHTML = data.briefing.identity.map(i => `<p>${i}</p>`).join('');
            document.getElementById('resTrend').innerHTML = data.briefing.trend.map(t => `<p>${t}</p>`).join('');
            document.getElementById('resCompliance').innerHTML = data.briefing.compliance.map(c => `<p>${c}</p>`).join('');
            document.getElementById('resCompetitors').innerHTML = data.briefing.competitors.map(c => `<li class="mb-1"><strong>• ${c.name}:</strong> ${c.reason}</li>`).join('');
            
            document.getElementById('mediaHead').textContent = data.mediaMix.headCopy;
            document.getElementById('mediaBanner').textContent = data.mediaMix.banner;
            document.getElementById('mediaShorts').textContent = data.mediaMix.shortForm;

            const brandKw = brandInput.value;
            const ytCont = document.getElementById('youtubeContainer');
            if (ytVideos && ytVideos.length > 0) {
                ytCont.innerHTML = ytVideos.map(v => `
                    <a href="https://youtube.com/watch?v=${v.id}" target="_blank" class="flex gap-4 group hover:bg-slate-50 p-3 rounded-xl transition border border-transparent hover:border-slate-200">
                        <div class="w-32 h-20 bg-slate-100 rounded-lg shrink-0 overflow-hidden relative shadow-sm">
                            <img src="${v.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="flex flex-col justify-center"><h4 class="text-[13px] font-bold text-slate-800 leading-snug group-hover:text-red-600 transition keep-all">${v.title}</h4><span class="text-[11px] text-slate-500 mt-1">${v.channel} • ${v.date}</span></div>
                    </a>
                `).join('');
            } else {
                ytCont.innerHTML = data.youtube.map(v => `
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(brandKw + ' ' + v.title)}" target="_blank" class="flex gap-4 group hover:bg-slate-50 p-3 rounded-xl transition border border-transparent hover:border-slate-200">
                        <div class="w-32 h-20 bg-slate-900 rounded-lg shrink-0 overflow-hidden relative shadow-sm group-hover:shadow-md transition flex items-center justify-center">
                            <i data-lucide="play-circle" class="absolute w-8 h-8 text-white/50 group-hover:text-red-500 transition z-10"></i>
                            <div class="absolute inset-0 bg-gradient-to-tr from-slate-900 to-slate-700 opacity-80"></div>
                        </div>
                        <div class="flex flex-col justify-center"><h4 class="text-[13px] font-bold text-slate-800 leading-snug group-hover:text-red-600 transition keep-all">${v.title}</h4><span class="text-[11px] text-slate-500 mt-1">${v.channel} • ${v.date} <span class="font-bold text-slate-400 border-l border-slate-300 pl-1 ml-1">조회수 ${v.views}</span></span></div>
                    </a>
                `).join('');
            }

            document.getElementById('tvcfContainer').innerHTML = data.tvcf.map(t => `
                <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(brandKw + ' TVCF ' + t.title)}" target="_blank" class="flex gap-4 group hover:bg-slate-50 p-3 rounded-xl transition border border-transparent hover:border-slate-200">
                    <div class="w-32 h-20 bg-gradient-to-tr from-blue-900 to-slate-800 rounded-lg shrink-0 flex items-center justify-center shadow-sm">
                        <i data-lucide="tv" class="w-6 h-6 text-white/30 group-hover:text-blue-400 transition"></i>
                    </div>
                    <div class="flex flex-col justify-center"><h4 class="text-[13px] font-bold text-slate-800 leading-snug group-hover:text-blue-600 transition keep-all">${t.title}</h4><span class="text-[11px] text-slate-400 mt-1 block font-medium">${t.date}</span><p class="text-[11px] text-slate-500 mt-0.5 line-clamp-1">${t.description}</p></div>
                </a>
            `).join('');

            lucide.createIcons();
        }

        function copyFullReport() {
            const element = document.getElementById('resultDashboard');
            if (element.classList.contains('hidden')) return showToast("복사할 리포트가 없습니다.");

            const textToCopy = `
[카피라이팅 심층 검수 리포트]
■ 판정 결과: ${document.getElementById('statusTitle').textContent} (적합도 ${document.getElementById('resScore').textContent}점)

[최소 수정 가이드]
- 원본: ${document.getElementById('minEditOriginal').textContent}
- 추천: ${document.getElementById('minEditRevised').textContent}

[매체별 변환 팩]
- 헤드카피: ${document.getElementById('mediaHead').textContent}
- 배너: ${document.getElementById('mediaBanner').textContent}
- 유튜브/숏폼: ${document.getElementById('mediaShorts').textContent}
            `.trim();

            const textArea = document.createElement("textarea");
            textArea.value = textToCopy; document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); showToast("리포트 요약이 복사되었습니다."); } 
            catch (err) { showToast("복사에 실패했습니다."); }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
